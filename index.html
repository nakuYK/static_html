<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Tiger Mansion Design Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="hero" aria-label="Little Tiger Mansion Design Team">
      <div class="hero-media" aria-hidden="true">
        <img src="./assets/hero-visual.png" alt="" class="hero-image" />
        <div class="hero-reveal"></div>
        <div class="light-field"></div>
        <div class="fine-grid"></div>
      </div>

      <nav class="studio-nav" aria-label="Primary">
        <a class="brand-mark" href="#">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path d="M8 39.5V9.2h7.8v23.6h7.6v6.7H8Z" />
            <path d="M23.6 39.5V9.2h7.2l9.2 17.9V9.2h7.1v30.3h-7.4L30.7 22v17.5h-7.1Z" />
          </svg>
          <span>LTM</span>
        </a>
        <div class="nav-line"></div>
      </nav>

      <section class="hero-copy">
        <p class="eyebrow">Full-cycle visual partner</p>
        <h1>Little Tiger Mansion Design Team</h1>
        <p class="tagline">UI &amp; 3D IP Full-Cycle Visual Design Studio</p>
        <p class="intro">13-year senior design team with Tencent background, all-industry one-stop visual solutions.</p>
        <div class="actions" aria-label="Hero actions">
          <a class="button primary" href="#">View Portfolio</a>
          <a class="button secondary" href="#">Cooperate With Us</a>
        </div>
      </section>

      <aside class="capability-panel" aria-label="Capabilities">
        <div class="panel-rule"></div>
        <div class="capability-row">
          <span>UI</span>
          <i></i>
        </div>
        <div class="capability-row">
          <span>3D IP</span>
          <i></i>
        </div>
        <div class="capability-row">
          <span>VISUAL</span>
          <i></i>
        </div>
      </aside>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
